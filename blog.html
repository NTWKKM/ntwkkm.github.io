<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Research Blog | NTWKKM</title>
    <meta name="description" content="Curated medical research papers with Thai-language commentary. Emergency Medicine, Clinical Informatics, and evidence-based practice.">
    <meta property="og:title" content="Medical Research Blog | NTWKKM">
    <meta property="og:description" content="Curated medical research papers with Thai-language commentary. Emergency Medicine, Clinical Informatics, and evidence-based practice.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ntwkkm.github.io/blog.html">
    <link rel="canonical" href="https://ntwkkm.github.io/blog.html">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23244885'/%3E%3Ctext x='50%25' y='50%25' font-family='Inter,sans-serif' font-weight='800' font-size='18' fill='white' text-anchor='middle' dominant-baseline='central'%3EN%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sarabun:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        :root {
            /* Light Mode Variables */
            --bg-body: #f8fafc;
            --bg-sidebar: #ffffff;
            --bg-paper-list: #f1f5f9;
            --bg-card: #ffffff;
            
            --text-main: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --primary-light: #eff6ff;
            
            --border-color: #e2e8f0;
            --border-light: #f1f5f9;
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --toc-bg: rgba(255, 255, 255, 0.8);

            /* Theme Toggle Button Vars (From index.html) */
            --toggle-bg: #E5E7EB;
        }

        /* 1. DARK MODE VARIABLES */
        [data-theme="dark"] {
            --bg-body: #0f172a; /* Dark Slate */
            --bg-sidebar: #1e293b;
            --bg-paper-list: #334155;
            --bg-card: #1e293b;
            
            --text-main: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #64748b;
            
            --primary: #3b82f6; /* Lighter blue for dark mode */
            --primary-dark: #60a5fa;
            --primary-light: rgba(59, 130, 246, 0.15);
            
            --border-color: #334155;
            --border-light: #334155;
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
            --toc-bg: rgba(30, 41, 59, 0.8);

            /* Theme Toggle Button Vars (From index.html) */
            --toggle-bg: #334155;
        }


        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Sarabun', 'Inter', sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }

        /* ===== LAYOUT ===== */
        .container {
            display: flex;
            height: 100vh;
            max-width: 100%;
            position: relative;
        }

        /* SIDEBAR */
        .sidebar {
            width: 30%;
            min-width: 320px;
            max-width: 400px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            z-index: 20;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
        }

        .sidebar.collapsed {
            width: 0;
            min-width: 0;
            opacity: 0;
            border: none;
            transform: translateX(-100%);
        }

        .sidebar-header {
            padding: 24px 24px 16px;
            border-bottom: 1px solid var(--border-light);
            flex-shrink: 0;
            background: var(--bg-sidebar);
            position: relative;
        }

        /* ACTION BUTTONS IN HEADER (Collapse & Theme) */
        .header-actions {
            position: absolute;
            top: 20px;
            right: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }


        /* Generic Icon Button for Sidebar Close */
        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            width: 36px;
            height: 36px;
        }
        
        .icon-btn:hover {
            background: var(--bg-paper-list);
            color: var(--text-main);
        }

        /* Toggle Button outside (Main Content) */
        .sidebar-open-btn {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 30;
            background: var(--bg-sidebar);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            opacity: 0;
            pointer-events: none;
            transform: translateX(-20px);
        }

        .container.sidebar-hidden .sidebar-open-btn {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0);
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        .sidebar-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border-color);
            background: var(--bg-sidebar);
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            padding: 48px 64px;
            overflow-y: auto;
            background: var(--bg-body);
            position: relative;
            scroll-behavior: smooth;
        }

        /* ===== COMPONENTS ===== */
        
        /* BRAND */
        .brand {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 20px;
            transition: color 0.2s;
            max-width: 60%; /* Space for buttons */
        }

        .brand:hover {
            color: var(--primary);
        }

        /* SEARCH */
        .search-container {
            position: relative;
            margin-bottom: 16px;
        }

        .search-input {
            width: 100%;
            padding: 10px 12px 10px 36px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            background: var(--bg-body); /* Adaptive bg */
            color: var(--text-main);
            outline: none;
            transition: all 0.2s ease;
        }

        .search-input::placeholder { color: var(--text-muted); }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
            background: var(--bg-sidebar);
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: var(--text-muted);
        }

        /* FILTER TAGS */
        .filter-tags-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 10px;
            display: block;
            font-weight: 700;
        }

        .filter-tags-wrapper {
            position: relative;
            margin-bottom: 0;
        }

        .filter-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            padding-right: 4px;
        }

        .filter-tag {
            font-size: 0.75rem;
            padding: 5px 12px;
            border-radius: 99px;
            background: var(--bg-paper-list);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            font-weight: 500;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .filter-tag:hover {
            background: var(--border-color);
            color: var(--text-main);
        }

        .filter-tag.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Tag count badge */
        .tag-count {
            font-size: 0.6rem;
            opacity: 0.7;
            font-weight: 600;
        }

        .filter-tag.active .tag-count {
            opacity: 0.85;
        }

        /* "More" toggle button */
        .filter-tag.more-btn {
            background: transparent;
            border: 1px dashed var(--border-color);
            color: var(--text-muted);
        }

        .filter-tag.more-btn:hover {
            border-style: solid;
            background: var(--bg-paper-list);
            color: var(--text-main);
        }

        .filter-tag.more-btn.open {
            border-style: solid;
            background: var(--primary-light);
            color: var(--primary);
        }

        /* More tags dropdown */
        .more-tags-dropdown {
            display: none;
            flex-wrap: wrap;
            gap: 6px;
            padding: 12px;
            margin-top: 8px;
            background: var(--bg-body);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            max-height: 200px;
            overflow-y: auto;
            animation: dropdownFade 0.2s ease;
        }

        .more-tags-dropdown.open {
            display: flex;
        }

        @keyframes dropdownFade {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Active tag count indicator in sidebar header */
        .active-filters-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            color: var(--primary);
            font-weight: 600;
            margin-left: 6px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .active-filters-badge.visible {
            opacity: 1;
        }

        .clear-filters-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .clear-filters-btn:hover {
            color: var(--primary);
            background: var(--primary-light);
        }

        /* ARTICLE LIST & SKELETON LOADING */
        .article-list-section {
            display: flex;
            flex-direction: column;
        }

        .articles-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            padding: 20px 24px 10px;
            font-weight: 700;
        }

        .article-list-item {
            display: block;
            padding: 14px 24px;
            margin: 0;
            text-decoration: none;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            cursor: pointer;
            border-bottom: 1px solid var(--border-light);
            border-left: 3px solid transparent;
        }

        .article-list-item:hover {
            background: var(--bg-paper-list);
            color: var(--text-main);
            padding-left: 28px;
        }

        .article-list-item.active {
            background: var(--primary-light);
            border-left-color: var(--primary);
            color: var(--primary-dark);
        }

        /* 4. SKELETON LOADING */
        .skeleton-loader {
            padding: 16px 24px;
        }
        
        .skeleton-item {
            margin-bottom: 16px;
        }
        
        .skeleton-line {
            height: 12px;
            background: #e2e8f0;
            border-radius: 4px;
            margin-bottom: 8px;
            position: relative;
            overflow: hidden;
        }
        
        [data-theme="dark"] .skeleton-line {
            background: #334155;
        }
        
        .skeleton-line::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer 1.5s infinite;
        }

        [data-theme="dark"] .skeleton-line::after {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .list-title {
            font-size: 0.9rem;
            line-height: 1.4;
            font-weight: 600;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .list-meta {
            font-size: 0.75rem;
            opacity: 0.8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* PAGINATION */
        .pagination-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .pagination-btn:hover:not(:disabled) {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
        }

        .pagination-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background: var(--bg-paper-list);
        }

        .page-info {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 600;
            min-width: 50px;
            text-align: center;
        }

        /* ===== ARTICLE VIEW ===== */
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
            background: var(--bg-sidebar);
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            box-shadow: var(--shadow-sm);
        }

        .article-view {
            max-width: 800px;
            margin: 0 auto;
            display: none;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .article-view.visible { display: block; }

        /* NAV BUTTONS */
        .article-navigation {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-bottom: 16px;
        }

        .nav-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.1rem;
        }

        .nav-btn:hover:not(:disabled) {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .article-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }
        
        /* 5. COPY CITATION BUTTON */
        .citation-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
            margin-left: auto; /* Push to right */
        }
        
        .citation-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .citation-btn.copied {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }

        .article-title {
            font-family: 'Inter', 'Sarabun', sans-serif;
            font-size: 1.25rem; /* Reduced from 2.25rem to be slightly larger than content (1rem) */
            font-weight: 800;
            line-height: 1.4;
            margin-bottom: 24px;
            color: var(--text-main);
            letter-spacing: -0.025em;
        }

        /* TAGS */
        .tags-container {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .tag-badge {
            display: inline-block;
            background: var(--primary-light);
            color: var(--primary);
            font-size: 0.75rem;
            padding: 6px 14px;
            border-radius: 99px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            border: 1px solid transparent;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .tag-badge:hover {
            border-color: var(--primary);
            transform: scale(1.05);
        }

        /* SECTIONS */
        .research-section {
            margin-bottom: 40px;
            background: var(--bg-card);
            border-radius: 8px;
        }

        .sec-header {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 16px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .sec-header::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
            opacity: 0.5;
        }

        .sec-content {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.8;
            text-align: justify;
        }

        .sec-content strong {
            color: var(--text-main);
            font-weight: 700;
        }

        /* 3. DYNAMIC TABLE OF CONTENTS (ToC) */
        .toc-container {
            position: fixed;
            right: 20px;
            top: 100px;
            width: 200px;
            background: var(--toc-bg);
            backdrop-filter: blur(10px);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            display: none; /* Hidden by default, shown by JS if space permits */
            z-index: 100;
            max-height: calc(100vh - 140px);
            overflow-y: auto;
        }
        
        .toc-title {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }
        
        .toc-link {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 4px 0;
            transition: color 0.2s;
            cursor: pointer;
        }
        
        .toc-link:hover { color: var(--primary); }

        /* 2. RELATED PAPERS */
        .related-papers-section {
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid var(--border-color);
        }

        .related-header {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-main);
        }

        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .related-card {
            background: var(--bg-paper-list);
            padding: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid transparent;
        }

        .related-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        .related-title {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .related-date {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .pubmed-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 48px;
            color: white;
            background: var(--primary);
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .pubmed-link:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        /* RESPONSIVE */
        @media (max-width: 1200px) {
            .toc-container { display: none !important; } /* Hide ToC on smaller screens */
        }

        @media (max-width: 1024px) {
            .container { flex-direction: column; height: auto; }
            .sidebar { width: 100%; max-width: none; border-right: none; border-bottom: 1px solid var(--border-color); max-height: 380px; }
            .sidebar.collapsed { width: 100%; opacity: 1; transform: none; }
            .sidebar-open-btn { display: none !important; }
            #sidebar-close-btn { display: none !important; }
            .header-actions { position: static; display: flex; margin-left: auto; }
            .sidebar-header { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; padding: 16px 20px; }
            .brand { margin-bottom: 0; flex-shrink: 0; }
            .search-container { width: 100%; margin-bottom: 8px; }
            .filter-tags { max-height: none; }
            .more-tags-dropdown { max-height: 150px; }
            .main-content { padding: 40px 32px; min-height: 500px; }
            .article-title { font-size: 1.8rem; }
        }

        @media (max-width: 640px) {
            .sidebar-header { padding: 16px; }
            .article-list-item { padding: 12px 16px; }
            .main-content { padding: 24px 20px; }
            .article-title { font-size: 1.5rem; }
        }

    </style>
</head>
<body>

    <div class="container" id="app-container">
        
        <button id="sidebar-open-btn" class="sidebar-open-btn">
            <span>☰ Show Menu</span>
        </button>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="https://ntwkkm.github.io/" class="brand">
                    <span>←</span> Research Hub
                </a>
                
                <div class="header-actions">
                    <button id="theme-toggle" class="theme-btn" aria-label="Toggle Dark Mode">
                        </button>
                    <button id="sidebar-close-btn" class="icon-btn" aria-label="Collapse sidebar">
                        «
                    </button>
                </div>
                
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="search-input" class="search-input" placeholder="Search papers..." aria-label="Search articles">
                </div>
                
                <label class="filter-tags-label">Topics <span id="active-filters-badge" class="active-filters-badge"></span></label>
                <div class="filter-tags-wrapper">
                    <div class="filter-tags" id="filter-tags-container">
                        <span class="filter-tag active" data-tag="all">All</span>
                    </div>
                    <div class="more-tags-dropdown" id="more-tags-dropdown"></div>
                </div>
            </div>

            <div class="sidebar-content">
                <div class="article-list-section">
                    <label class="articles-label">Papers List</label>
                    <div id="loading-indicator" class="skeleton-loader" style="display: none;">
                        <div class="skeleton-item"><div class="skeleton-line" style="width:70%"></div><div class="skeleton-line" style="width:40%"></div></div>
                        <div class="skeleton-item"><div class="skeleton-line" style="width:80%"></div><div class="skeleton-line" style="width:30%"></div></div>
                        <div class="skeleton-item"><div class="skeleton-line" style="width:60%"></div><div class="skeleton-line" style="width:50%"></div></div>
                    </div>
                    <div id="sidebar-list"></div>
                </div>
            </div>

            <div class="sidebar-footer">
                <button id="prev-btn" class="pagination-btn" aria-label="Previous page">← Prev</button>
                <span id="page-info" class="page-info">1 / 1</span>
                <button id="next-btn" class="pagination-btn" aria-label="Next page">Next →</button>
            </div>
        </aside>

        <main class="main-content">
            <div id="toc-container" class="toc-container">
                <div class="toc-title">On this page</div>
                <div id="toc-list"></div>
            </div>

            <div id="empty-state" class="empty-state">
                <div class="empty-icon">📑</div>
                <h3>Select a research paper</h3>
                <p>Choose from the list on the left to view full details.</p>
            </div>

            <article id="article-view" class="article-view">
                <div class="article-navigation">
                    <button id="nav-prev-article" class="nav-btn" aria-label="Previous Article">‹</button>
                    <button id="nav-next-article" class="nav-btn" aria-label="Next Article">›</button>
                </div>

                <div class="article-meta">
                    <span>📅 <span id="post-date">...</span></span>
                    <span>|</span>
                    <span>🔖 <span id="post-id" style="font-family: monospace;"></span></span>
                    <button id="citation-btn" class="citation-btn" title="Copy Citation">
                        🔗 Cite
                    </button>
                </div>

                <h1 class="article-title" id="post-title">...</h1>
                
                <div id="post-tags" class="tags-container"></div>
                
                <div id="formatted-summary-container"></div>

                <div id="related-papers" class="related-papers-section" style="display:none;">
                    <div class="related-header">Related Papers</div>
                    <div id="related-grid" class="related-grid"></div>
                </div>

                <a href="#" target="_blank" id="post-link" class="pubmed-link">
                    📖 View Full Paper
                </a>
            </article>
        </main>
    </div>

    <script>
        // Global State
        let allPosts = [];
        let filteredPosts = [];
        let currentPage = 1;
        const itemsPerPage = 10;
        let activeTags = new Set();  // empty = show all (multi-select)
        let currentPostId = null;
        
        const CACHE_KEY = 'research_blog_data';
        const CACHE_DURATION = 1000 * 60 * 5; // 5 minutes

        // Step 1: Tag normalization — merge near-duplicate AI-generated tags
        const TAG_NORMALIZATION = {
            'Emergency': 'Emergency Medicine',
            'Infectious Disease': 'Infectious Diseases',
            'Artificial Intelligence': 'AI',
            'Artificial intelligence': 'AI',
            'Machine Learning': 'AI',
            'Critical care': 'Critical Care',
            'Public health': 'Public Health',
            'Internal medicine': 'Internal Medicine',
            'Pain management': 'Pain Management',
            'Drug discovery': 'Drug Discovery',
        };
        const TOP_TAGS_COUNT = 12;

        document.addEventListener('DOMContentLoaded', async () => {
            // 1. Theme Initialization
            initTheme();

            const loadingEl = document.getElementById('loading-indicator');
            loadingEl.style.display = 'block';
            
            try {
                let rawData = null;
                const cached = localStorage.getItem(CACHE_KEY);
                
                if (cached) {
                    try {
                        const parsedCache = JSON.parse(cached);
                        if (Date.now() - parsedCache.timestamp < CACHE_DURATION) {
                            console.log("Using cached data");
                            rawData = parsedCache.data;
                        }
                    } catch (e) { console.warn("Cache error"); }
                }

                if (!rawData) {
                    // 1. Fetch the list of JSON files from blog_index.json (cache-busted)
                    const cacheBuster = `?v=${Date.now()}`;
                    const indexResponse = await fetch(`./blog_index.json${cacheBuster}`);
                    const fileList = await indexResponse.json();

                    // 2. Fetch data from all files concurrently (cache-busted)
                    const fetchPromises = fileList.map(file => fetch(`./${file}${cacheBuster}`).then(res => res.json()));
                    const allFilesData = await Promise.all(fetchPromises);

                    // 3. Flatten and combine data from all sources
                    rawData = allFilesData.flat();

                    localStorage.setItem(CACHE_KEY, JSON.stringify({
                        timestamp: Date.now(),
                        data: rawData
                    }));
                }
                
                const rawList = Array.isArray(rawData) ? rawData : (rawData.data || []);
                
                allPosts = rawList.map(item => {
                    const tags = [item.property_tag_1, item.property_tag_2, item.property_tag_3]
                        .filter(t => t && t.trim() !== "")
                        .map(t => TAG_NORMALIZATION[t.trim()] || t.trim())
                        .filter((t, i, arr) => arr.indexOf(t) === i); // dedupe after normalization
                    let dateStr = "";
                    let timestamp = 0;
                    if (item.property_last_edited_time) {
                        const d = new Date(item.property_last_edited_time);
                        timestamp = d.getTime();
                        dateStr = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
                    }

                    return {
                        id: item.id,
                        title: item.name,
                        summary: item.property_comment,
                        objective: item.property_objective || null,
                        method: item.property_method || null, 
                        result: item.property_result || item.property_conclusion || null,
                        date: dateStr,
                        timestamp: timestamp,
                        tags: tags,
                        link: item.url,
                        pmid: item.property_pmid
                    };
                });

                allPosts.sort((a, b) => b.timestamp - a.timestamp);
                filteredPosts = [...allPosts];
                
                initTags(allPosts);
                renderSidebar();
                setupEventListeners();
                handleRouting();

            } catch (error) {
                console.error("Error:", error);
                document.getElementById('sidebar-list').innerHTML = `<div style="text-align:center; color:#ef4444; margin-top:20px;">Failed to load data.</div>`;
            } finally {
                loadingEl.style.display = 'none';
            }
        });

        // --- SECURITY: HTML Sanitization ---
        function escapeHTML(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function sanitizeURL(url) {
            if (!url) return '#';
            try { return ['http:', 'https:'].includes(new URL(url).protocol) ? url : '#'; }
            catch { return '#'; }
        }

        /* --- 1. DARK MODE LOGIC (Unified with index.html: uses data-theme attribute) --- */
        function initTheme() {
            const toggleBtn = document.getElementById('theme-toggle');
            const htmlElement = document.documentElement;
            
            // Icons from index.html
            const sunIcon = `<svg viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 000-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 000 1.41.996.996 0 001.41 0l1.06-1.06c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06z"/></svg>`;
            const moonIcon = `<svg viewBox="0 0 24 24"><path d="M9.37 5.51A7.35 7.35 0 009.1 7.5c0 4.08 3.32 7.4 7.4 7.4.68 0 1.35-.09 1.99-.27A7.014 7.014 0 0112 19c-3.86 0-7-3.14-7-7 0-2.93 1.81-5.45 4.37-6.49zM12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>`;

            // Initialize: use data-theme attribute (same as index.html)
            const savedTheme = localStorage.getItem('theme') || 'light';
            htmlElement.setAttribute('data-theme', savedTheme);
            toggleBtn.innerHTML = savedTheme === 'dark' ? sunIcon : moonIcon;

            // Click Handler
            toggleBtn.addEventListener('click', () => {
                const currentTheme = htmlElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                htmlElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                toggleBtn.innerHTML = newTheme === 'dark' ? sunIcon : moonIcon;
            });
        }

        function setupEventListeners() {
            document.getElementById('search-input').addEventListener('input', (e) => handleFilter(e.target.value));
            document.getElementById('prev-btn').addEventListener('click', () => changePage(-1));
            document.getElementById('next-btn').addEventListener('click', () => changePage(1));

            // Sidebar Toggle
            const sidebar = document.getElementById('sidebar');
            const container = document.getElementById('app-container');
            
            document.getElementById('sidebar-close-btn').addEventListener('click', () => {
                sidebar.classList.add('collapsed');
                container.classList.add('sidebar-hidden');
            });

            document.getElementById('sidebar-open-btn').addEventListener('click', () => {
                sidebar.classList.remove('collapsed');
                container.classList.remove('sidebar-hidden');
            });

            // Article Nav
            document.getElementById('nav-prev-article').addEventListener('click', () => navigateArticle(-1));
            document.getElementById('nav-next-article').addEventListener('click', () => navigateArticle(1));

            // Copy Citation
            document.getElementById('citation-btn').addEventListener('click', copyCitation);

            // Keyboard
            document.addEventListener('keydown', (e) => {
                if (document.activeElement === document.getElementById('search-input')) return;
                if (e.key === 'ArrowLeft') navigateArticle(-1);
                else if (e.key === 'ArrowRight') navigateArticle(1);
            });
        }

        function copyCitation() {
            const title = document.getElementById('post-title').textContent;
            const url = window.location.href;
            const textToCopy = `${title}. Available at: ${url}`;
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                const btn = document.getElementById('citation-btn');
                const originalText = btn.innerHTML;
                btn.classList.add('copied');
                btn.innerHTML = '✓ Copied!';
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.innerHTML = originalText;
                }, 2000);
            });
        }

        // Step 2 & 3: Top-N pills with count badges + More dropdown
        function initTags(posts) {
            const tagCounts = new Map();
            posts.forEach(p => {
                if (p.tags) p.tags.forEach(t => {
                    tagCounts.set(t, (tagCounts.get(t) || 0) + 1);
                });
            });

            // Sort by count descending, then alphabetically
            const sortedTags = Array.from(tagCounts.entries())
                .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));

            const topTags = sortedTags.slice(0, TOP_TAGS_COUNT);
            const moreTags = sortedTags.slice(TOP_TAGS_COUNT);

            const container = document.getElementById('filter-tags-container');
            container.innerHTML = '';

            // "All" pill
            const allPill = createTagPill('all', 'All', posts.length);
            allPill.classList.add('active');
            container.appendChild(allPill);

            // Top-N tag pills
            topTags.forEach(([tag, count]) => {
                container.appendChild(createTagPill(tag, tag, count));
            });

            // "More" toggle if remaining tags exist
            const dropdown = document.getElementById('more-tags-dropdown');
            dropdown.innerHTML = '';

            if (moreTags.length > 0) {
                const moreBtn = document.createElement('span');
                moreBtn.className = 'filter-tag more-btn';
                moreBtn.id = 'more-tags-btn';
                moreBtn.innerHTML = `More <span class="tag-count">(${moreTags.length})</span> ▾`;
                moreBtn.onclick = (e) => {
                    e.stopPropagation();
                    moreBtn.classList.toggle('open');
                    dropdown.classList.toggle('open');
                    moreBtn.innerHTML = dropdown.classList.contains('open')
                        ? `Less ▴`
                        : `More <span class="tag-count">(${moreTags.length})</span> ▾`;
                };
                container.appendChild(moreBtn);

                // Render dropdown tags
                moreTags.forEach(([tag, count]) => {
                    dropdown.appendChild(createTagPill(tag, tag, count));
                });
            }
        }

        function createTagPill(dataTag, label, count) {
            const span = document.createElement('span');
            span.className = 'filter-tag';
            span.dataset.tag = dataTag;
            if (dataTag === 'all') {
                span.innerHTML = `${escapeHTML(label)} <span class="tag-count">(${count})</span>`;
            } else {
                span.innerHTML = `${escapeHTML(label)} <span class="tag-count">(${count})</span>`;
            }
            span.onclick = () => selectTag(dataTag);
            // Restore active state if previously selected
            if (activeTags.has(dataTag)) span.classList.add('active');
            return span;
        }

        // Step 4: Multi-select toggle (OR logic)
        function selectTag(tag) {
            if (tag === 'all') {
                activeTags.clear();
            } else {
                if (activeTags.has(tag)) {
                    activeTags.delete(tag);
                } else {
                    activeTags.add(tag);
                }
            }
            refreshTagUI();
            updateURLState();
            document.getElementById('search-input').value = '';
            handleFilter('');
        }

        function refreshTagUI() {
            document.querySelectorAll('.filter-tag').forEach(el => {
                if (el.classList.contains('more-btn')) return;
                if (el.dataset.tag === 'all') {
                    el.classList.toggle('active', activeTags.size === 0);
                } else if (el.dataset.tag) {
                    el.classList.toggle('active', activeTags.has(el.dataset.tag));
                }
            });
            // Update active filters badge
            const badge = document.getElementById('active-filters-badge');
            if (activeTags.size > 0) {
                badge.classList.add('visible');
                badge.innerHTML = `(${activeTags.size} active) <button class="clear-filters-btn" onclick="selectTag('all')" title="Clear all filters">✕</button>`;
            } else {
                badge.classList.remove('visible');
                badge.innerHTML = '';
            }
        }

        function handleFilter(query) {
            const lowerQuery = query.toLowerCase();
            filteredPosts = allPosts.filter(post => {
                // Step 4: Multi-select OR logic — matches if ANY active tag is in the post's tags
                const matchesTag = activeTags.size === 0 || (post.tags && post.tags.some(t => activeTags.has(t)));
                const matchesSearch = post.title.toLowerCase().includes(lowerQuery) || 
                                      post.id.includes(lowerQuery) || 
                                      (post.summary && post.summary.toLowerCase().includes(lowerQuery));
                return matchesTag && matchesSearch;
            });
            currentPage = 1;
            renderSidebar();
        }

        function renderSidebar() {
            const listContainer = document.getElementById('sidebar-list');
            listContainer.innerHTML = '';

            if (filteredPosts.length === 0) {
                listContainer.innerHTML = '<div style="text-align:center; margin-top:30px; color:#94a3b8; font-size:0.9rem;">No results found.</div>';
                updatePaginationControls();
                return;
            }

            const startIndex = (currentPage - 1) * itemsPerPage;
            const pageItems = filteredPosts.slice(startIndex, startIndex + itemsPerPage);

            pageItems.forEach(post => {
                const item = document.createElement('div');
                item.className = 'article-list-item';
                if (post.id === currentPostId) item.classList.add('active');
                item.dataset.id = post.id;
                item.innerHTML = `<div class="list-title">${escapeHTML(post.title)}</div><div class="list-meta"><span>${escapeHTML(post.date)}</span></div>`;
                item.onclick = () => loadArticle(post);
                listContainer.appendChild(item);
            });
            updatePaginationControls();
        }

        function updatePaginationControls() {
            const totalPages = Math.ceil(filteredPosts.length / itemsPerPage);
            document.getElementById('page-info').textContent = `${currentPage} / ${totalPages || 1}`;
            document.getElementById('prev-btn').disabled = currentPage === 1;
            document.getElementById('next-btn').disabled = currentPage >= totalPages || totalPages === 0;
        }

        function changePage(delta) {
            currentPage += delta;
            renderSidebar();
            document.querySelector('.sidebar-content').scrollTop = 0;
        }

        function loadArticle(post) {
            currentPostId = post.id;
            document.title = `${post.title} | Medical Research Blog`;

            document.getElementById('empty-state').style.display = 'none';
            const articleView = document.getElementById('article-view');
            articleView.classList.remove('visible');

            document.getElementById('post-date').textContent = post.date;
            document.getElementById('post-id').textContent = post.id;
            document.getElementById('post-title').textContent = post.title;

            const tagsContainer = document.getElementById('post-tags');
            tagsContainer.innerHTML = '';
            if (post.tags && post.tags.length > 0) {
                post.tags.forEach(tag => {
                    const tagEl = document.createElement('span');
                    tagEl.className = 'tag-badge';
                    tagEl.textContent = tag;
                    tagEl.onclick = (e) => { e.stopPropagation(); selectTag(tag); };
                    tagsContainer.appendChild(tagEl);
                });
            } else {
                tagsContainer.innerHTML = '<span style="color:#cbd5e1; font-size:0.8rem;">No tags</span>';
            }

            // Render Content
            const summaryContainer = document.getElementById('formatted-summary-container');
            summaryContainer.innerHTML = parseContent(post);
            
            // Generate ToC AFTER content is rendered
            generateToC();
            
            // Render Related Papers
            renderRelatedPapers(post);

            const linkBtn = document.getElementById('post-link');
            if (post.pmid) {
                linkBtn.href = `https://pubmed.ncbi.nlm.nih.gov/${post.pmid}/`;
                linkBtn.innerHTML = `📖 View on PubMed`;
                linkBtn.style.display = 'inline-flex';
            } else if (post.link) {
                linkBtn.href = post.link;
                linkBtn.innerHTML = `📖 Read Source`;
                linkBtn.style.display = 'inline-flex';
            } else {
                linkBtn.style.display = 'none';
            }

            document.querySelectorAll('.article-list-item').forEach(el => el.classList.remove('active'));
            const activeEl = document.querySelector(`.article-list-item[data-id="${post.id}"]`);
            if (activeEl) activeEl.classList.add('active');

            // Step 5: Preserve tag state in URL when navigating articles
            const params = new URLSearchParams();
            params.set('id', post.id);
            if (activeTags.size > 0) params.set('tag', Array.from(activeTags).join(','));
            const newUrl = `${window.location.pathname}?${params.toString()}`;
            history.pushState({ id: post.id }, '', newUrl);
            updateNavButtonsState();

            setTimeout(() => articleView.classList.add('visible'), 50);
            document.querySelector('.main-content').scrollTop = 0;
        }

        /* --- 3. DYNAMIC ToC LOGIC --- */
        function generateToC() {
            const tocContainer = document.getElementById('toc-container');
            const tocList = document.getElementById('toc-list');
            tocList.innerHTML = '';
            
            const headers = document.querySelectorAll('.sec-header');
            
            if (headers.length > 0 && window.innerWidth > 1200) {
                tocContainer.style.display = 'block';
                headers.forEach((header, index) => {
                    header.id = `section-${index}`; // Assign ID for anchor
                    const link = document.createElement('a');
                    link.className = 'toc-link';
                    link.textContent = header.textContent;
                    link.onclick = (e) => {
                        e.preventDefault();
                        header.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    };
                    tocList.appendChild(link);
                });
            } else {
                tocContainer.style.display = 'none';
            }
        }

        /* --- 2. RELATED PAPERS LOGIC --- */
        function renderRelatedPapers(currentPost) {
            const container = document.getElementById('related-papers');
            const grid = document.getElementById('related-grid');
            grid.innerHTML = '';

            // Find overlapping tags, excluding current post
            const related = allPosts.filter(p => 
                p.id !== currentPost.id && 
                p.tags && currentPost.tags && 
                p.tags.some(t => currentPost.tags.includes(t))
            ).slice(0, 3); // Top 3

            if (related.length > 0) {
                container.style.display = 'block';
                related.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'related-card';
                    card.innerHTML = `<div class="related-title">${escapeHTML(p.title)}</div><div class="related-date">${escapeHTML(p.date)}</div>`;
                    card.onclick = () => loadArticle(p);
                    grid.appendChild(card);
                });
            } else {
                container.style.display = 'none';
            }
        }

        function navigateArticle(direction) {
            if (!currentPostId || filteredPosts.length === 0) return;
            const currentIndex = filteredPosts.findIndex(p => p.id === currentPostId);
            if (currentIndex === -1) return;
            const newIndex = currentIndex + direction;
            if (newIndex >= 0 && newIndex < filteredPosts.length) {
                loadArticle(filteredPosts[newIndex]);
            }
        }

        function updateNavButtonsState() {
            const currentIndex = filteredPosts.findIndex(p => p.id === currentPostId);
            document.getElementById('nav-prev-article').disabled = (currentIndex <= 0);
            document.getElementById('nav-next-article').disabled = (currentIndex >= filteredPosts.length - 1);
        }

        function parseContent(post) {
            if (post.objective || post.method || post.result) {
                let html = '';
                if (post.objective) html += `<div class="research-section"><div class="sec-header">Objective</div><div class="sec-content">${escapeHTML(post.objective).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</div></div>`;
                if (post.method) html += `<div class="research-section"><div class="sec-header">Methods</div><div class="sec-content">${escapeHTML(post.method).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</div></div>`;
                if (post.result) html += `<div class="research-section"><div class="sec-header">Results & Conclusion</div><div class="sec-content">${escapeHTML(post.result).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</div></div>`;
                return html;
            }
            return parseSummaryToSections(post.summary);
        }

        function parseSummaryToSections(text) {
            if (!text) return '<p style="color:var(--text-muted); font-style:italic;">No summary content available.</p>';
            const lines = text.split(/\n/);
            let html = '';
            lines.forEach(line => {
                let cleanLine = line.trim().replace(/^[-•*]\s*/, '');
                if (!cleanLine) return;
                
                let sectionTitle = "";
                let sectionContent = cleanLine;

                if (cleanLine.match(/^(วัตถุประสงค์|Objective)/i)) sectionTitle = "Objective";
                else if (cleanLine.match(/^(วิธีการ|Method)/i)) sectionTitle = "Methods";
                else if (cleanLine.match(/^(ผลลัพธ์|Result|Conclusion|สรุป|ผลวิเคราะห์)/i)) sectionTitle = "Results & Conclusion";

                if (sectionTitle) {
                    sectionContent = cleanLine.replace(/^(\*\*)?(วัตถุประสงค์|Objective|วิธีการ|Method|Methods|Results|Result|Conclusion|สรุป|ผลลัพธ์|ผลวิเคราะห์).*?[:：]?(\*\*)?[:：]?\s*/i, '').trim();
                    // Sanitize first, then allow bold formatting
                    const safeSectionContent = escapeHTML(sectionContent).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    html += `<div class="research-section"><div class="sec-header">${sectionTitle}</div><div class="sec-content">${safeSectionContent}</div></div>`;
                } else {
                    // Sanitize first, then allow bold formatting
                    const formattedContent = escapeHTML(cleanLine).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    html += `<div class="research-section"><div class="sec-content">${formattedContent}</div></div>`;
                }
            });
            return html;
        }

        // Step 5: URL state sync — restore tags from ?tag= param
        function handleRouting() {
            const params = new URLSearchParams(window.location.search);

            // Restore tag state from URL
            const tagParam = params.get('tag');
            if (tagParam) {
                tagParam.split(',').forEach(t => {
                    const trimmed = t.trim();
                    if (trimmed) activeTags.add(trimmed);
                });
                refreshTagUI();
                handleFilter('');
            }

            // Load specific article if ID present
            const id = params.get('id');
            if (id && allPosts.length > 0) {
                const post = allPosts.find(p => p.id === id);
                if (post) loadArticle(post);
            }
        }

        function updateURLState() {
            const params = new URLSearchParams(window.location.search);
            if (activeTags.size > 0) {
                params.set('tag', Array.from(activeTags).join(','));
            } else {
                params.delete('tag');
            }
            const newUrl = `${window.location.pathname}${params.toString() ? '?' + params.toString() : ''}`;
            history.replaceState(history.state, '', newUrl);
        }

        window.onpopstate = function(event) {
            // Restore tags from URL on back/forward
            const params = new URLSearchParams(window.location.search);
            activeTags.clear();
            const tagParam = params.get('tag');
            if (tagParam) {
                tagParam.split(',').forEach(t => {
                    const trimmed = t.trim();
                    if (trimmed) activeTags.add(trimmed);
                });
            }
            refreshTagUI();
            handleFilter(document.getElementById('search-input').value || '');

            if (event.state && event.state.id) {
                const post = allPosts.find(p => p.id === event.state.id);
                if (post) loadArticle(post);
            }
        };

    </script>
</body>
