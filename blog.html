    <script src="shared.js"></script>
    <script>
        // Register Service Worker for PWA offline support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((registration) => {
                        console.log('[PWA] ServiceWorker registered:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('[PWA] ServiceWorker registration failed:', error);
                    });
            });
        }

        // Global State
        let allPosts = [];
        let filteredPosts = [];
        let currentPage = 1;
        const itemsPerPage = 10;
        let activeTags = new Set();  // empty = show all (multi-select)
        let currentPostId = null;
        let tocObserver = null;

        const CACHE_KEY = 'research_blog_data_v2';
        const CACHE_DURATION = 1000 * 60 * 5; // 5 minutes

        // Step 1: Tag normalization — merge near-duplicate AI-generated tags
        const TAG_NORMALIZATION = {
            'Emergency': 'Emergency Medicine',
            'Infectious Disease': 'Infectious Diseases',
            'Artificial Intelligence': 'AI',
            'Artificial intelligence': 'AI',
            'Machine Learning': 'AI',
            'Critical care': 'Critical Care',
            'Public health': 'Public Health',
            'Internal medicine': 'Internal Medicine',
            'Pain management': 'Pain Management',
            'Drug discovery': 'Drug Discovery',
        };
        const TOP_TAGS_COUNT = 12;

        // Initialize screen reader announcer
        document.addEventListener('DOMContentLoaded', () => {
            initScreenReaderAnnouncer();
        });

        // ===========================================================================
        // READING PROGRESS INDICATOR
        // ===========================================================================
        function initReadingProgress() {
            const progressBar = document.createElement('div');
            progressBar.className = 'reading-progress';
            progressBar.innerHTML = '<div class="reading-progress-bar"></div>';
            document.body.prepend(progressBar);

            const progressBarFill = progressBar.querySelector('.reading-progress-bar');
            const mainContent = document.querySelector('.main-content');
            if (!mainContent) return;

            window.updateReadingProgress = () => {
                const articleView = document.getElementById('article-view');
                if (!articleView || !articleView.classList.contains('visible')) {
                    progressBar.style.display = 'none';
                    return;
                }

                let scrollTop, scrollHeight;
                if (window.innerWidth > 1024) {
                    scrollTop = mainContent.scrollTop;
                    scrollHeight = mainContent.scrollHeight - mainContent.clientHeight;
                } else {
                    scrollTop = window.scrollY || document.documentElement.scrollTop;
                    scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
                }

                const progress = scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0;
                progressBarFill.style.width = `${Math.min(100, Math.max(0, progress))}%`;
                progressBar.style.display = 'block';
            };

            mainContent.addEventListener('scroll', window.updateReadingProgress);
            window.addEventListener('scroll', window.updateReadingProgress);
            window.addEventListener('resize', () => {
                if (window.updateReadingProgress) window.updateReadingProgress();
                clearTimeout(window.tocResizeTimeout);
                window.tocResizeTimeout = setTimeout(() => {
                    generateToC();
                }, 100);
            });
        }

        // ===========================================================================
        // CITATION EXPORT
        // ===========================================================================
        function generateCitation(post, format = 'apa') {
            const authors = post.authors || 'Unknown Authors';
            const year = post.date ? new Date(post.date).getFullYear() : 'n.d.';
            const title = post.title || 'Untitled';
            const url = post.link || post.url || '';
            const pmid = post.pmid || '';
            const accessed = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });

            switch (format) {
                case 'bibtex':
                    return `@article{${pmid || 'unknown'},
  author = {${authors}},
  title = {${title}},
  journal = {PubMed},
  year = {${year}},
  pmid = {${pmid}},
  url = {${url}},
  note = {Accessed: ${accessed}}
}`;
                case 'apa':
                    return `${authors} (${year}). ${title}${pmid ? `. PMID: ${pmid}` : ''}. Retrieved ${accessed}, from ${url || 'PubMed'}`;
                case 'mla':
                    return `${authors}. "${title}." PubMed, ${year}${pmid ? `, PMID ${pmid}` : ''}, ${url || 'PubMed'}. Accessed ${accessed}.`;
                case 'vancouver':
                    return `${authors}. ${title}. ${pmid ? `PMID: ${pmid}. ` : ''}${year} [cited ${accessed}]. Available from: ${url || 'PubMed'}`;
                default:
                    return `${title}. ${url}`;
            }
        }

        let currentCitationFormat = 'apa';
        let currentCitationPost = null;

        function openCitationModal(post) {
            currentCitationPost = post;
            const modal = document.createElement('div');
            modal.className = 'citation-modal-overlay';
            modal.id = 'citation-modal';
            modal.innerHTML = `
                <div class="citation-modal" role="dialog" aria-label="Citation options" aria-modal="true">
                    <div class="citation-modal-header">
                        <h3 class="citation-modal-title">Cite this paper</h3>
                        <button class="citation-modal-close" onclick="closeCitationModal()" aria-label="Close citation modal">&times;</button>
                    </div>
                    <div class="citation-format-tabs" role="tablist">
                        <button class="citation-format-tab active" data-format="apa" role="tab" aria-selected="true" onclick="switchCitationFormat('apa', this)">APA</button>
                        <button class="citation-format-tab" data-format="mla" role="tab" aria-selected="false" onclick="switchCitationFormat('mla', this)">MLA</button>
                        <button class="citation-format-tab" data-format="vancouver" role="tab" aria-selected="false" onclick="switchCitationFormat('vancouver', this)">Vancouver</button>
                        <button class="citation-format-tab" data-format="bibtex" role="tab" aria-selected="false" onclick="switchCitationFormat('bibtex', this)">BibTeX</button>
                    </div>
                    <textarea class="citation-text-area" id="citation-text" readonly aria-label="Citation text">${escapeHTML(generateCitation(post, 'apa'))}</textarea>
                    <button class="citation-copy-btn" onclick="copyCitationText()" aria-label="Copy citation to clipboard">
                        📋 Copy Citation
                    </button>
                </div>
            `;
            document.body.appendChild(modal);

            // Close on overlay click
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeCitationModal();
            });

            // Focus trap and Escape handling
            const focusableElements = modal.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
            if (focusableElements.length > 0) {
                const firstFocusable = focusableElements[0];
                const lastFocusable = focusableElements[focusableElements.length - 1];

                modal.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape') {
                        closeCitationModal();
                        e.stopPropagation();
                    } else if (e.key === 'Tab') {
                        if (e.shiftKey) { // Shift + Tab
                            if (document.activeElement === firstFocusable) {
                                lastFocusable.focus();
                                e.preventDefault();
                            }
                        } else { // Tab
                            if (document.activeElement === lastFocusable) {
                                firstFocusable.focus();
                                e.preventDefault();
                            }
                        }
                    }
                });
            }

            // Focus trap for accessibility
            modal.querySelector('.citation-modal-close').focus();
        }

        function closeCitationModal() {
            const modal = document.getElementById('citation-modal');
            if (modal) {
                modal.remove();
            }
        }

        function switchCitationFormat(format, btn) {
            currentCitationFormat = format;
            const textArea = document.getElementById('citation-text');
            textArea.value = generateCitation(currentCitationPost, format);

            // Update tab states
            document.querySelectorAll('.citation-format-tab').forEach(tab => {
                tab.classList.remove('active');
                tab.setAttribute('aria-selected', 'false');
            });
            btn.classList.add('active');
            btn.setAttribute('aria-selected', 'true');
        }

        function copyCitationText() {
            const textArea = document.getElementById('citation-text');
            navigator.clipboard.writeText(textArea.value).then(() => {
                const btn = document.querySelector('.citation-copy-btn');
                btn.classList.add('copied');
                btn.innerHTML = '✓ Copied!';
                announceToScreenReader('Citation copied to clipboard');

                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.innerHTML = '📋 Copy Citation';
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy clipboard: ', err);
                announceToScreenReader('Failed to copy citation', 'assertive');
            });
        }



        // ===========================================================================
        // MAIN DATA LOADING
        // ===========================================================================
        document.addEventListener('DOMContentLoaded', async () => {
            // Initialize reading progress
            initReadingProgress();

            // Collapse sidebar on page load if mobile
            if (window.innerWidth <= 1024) {
                document.getElementById('sidebar').classList.add('collapsed');
                document.getElementById('app-container').classList.add('sidebar-hidden');
            }

            const loadingEl = document.getElementById('loading-indicator');
            loadingEl.style.display = 'block';

            try {
                let rawData = null;
                const cached = localStorage.getItem(CACHE_KEY);

                if (cached) {
                    try {
                        const parsedCache = JSON.parse(cached);
                        if (Date.now() - parsedCache.timestamp < CACHE_DURATION) {
                            console.log("Using cached data");
                            rawData = parsedCache.data;
                        }
                    } catch (e) { console.warn("Cache error"); }
                }

                if (!rawData) {
                    // 1. Fetch the list of JSON files from blog_index.json (cache-busted)
                    const cacheBuster = `?v=${Date.now()}`;

                    // Use fetchWithFallback for resilience
                    const fileList = await fetchWithFallback('./blog_index.json' + cacheBuster, []);

                    if (!fileList.length) {
                        throw new Error('No blog data files found');
                    }

                    // 2. Fetch data from all files concurrently
                    const fetchPromises = fileList.map(file =>
                        fetchWithFallback(`./${file}${cacheBuster}`, [])
                    );
                    const allFilesData = await Promise.all(fetchPromises);

                    // 3. Flatten and combine data from all sources
                    rawData = allFilesData.flat();

                    if (!rawData.length) {
                        throw new Error('No blog posts found');
                    }

                    localStorage.setItem(CACHE_KEY, JSON.stringify({
                        timestamp: Date.now(),
                        data: rawData
                    }));
                }

                const rawList = Array.isArray(rawData) ? rawData : (rawData.data || []);

                allPosts = rawList.map(item => {
                    const tags = [item.property_tag_1, item.property_tag_2, item.property_tag_3]
                        .filter(t => t && t.trim() !== "")
                        .map(t => TAG_NORMALIZATION[t.trim()] || t.trim())
                        .filter((t, i, arr) => arr.indexOf(t) === i); // dedupe after normalization
                    let dateStr = "";
                    let timestamp = 0;
                    if (item.property_last_edited_time) {
                        const d = new Date(item.property_last_edited_time);
                        timestamp = d.getTime();
                        dateStr = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
                    }

                    return {
                        id: item.id,
                        title: item.name,
                        summary: item.property_comment,
                        objective: item.property_objective || null,
                        method: item.property_method || null,
                        result: item.property_result || item.property_conclusion || null,
                        date: dateStr,
                        timestamp: timestamp,
                        tags: tags,
                        link: item.url,
                        pmid: item.property_pmid,
                        authors: item.property_authors || item.authors || null
                    };
                });

                allPosts.sort((a, b) => b.timestamp - a.timestamp);
                filteredPosts = [...allPosts];

                initTags(allPosts);
                renderSidebar();
                setupEventListeners();
                handleRouting();

            } catch (error) {
                console.error("Error:", error);
                document.getElementById('sidebar-list').innerHTML = `
                    <div style="padding:20px; text-align:center; color:var(--text-muted); display:flex; flex-direction:column; align-items:center; gap:10px;">
                        <span>Failed to load data.</span>
                        <button onclick="location.reload()" class="pagination-btn" style="cursor:pointer; width:auto; border-radius:50px; font-size:0.8rem; padding:6px 16px;">Retry ↻</button>
                    </div>`;
            } finally {
                loadingEl.style.display = 'none';
            }
        });


        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            const container = document.getElementById('app-container');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar) sidebar.classList.add('collapsed');
            if (container) container.classList.add('sidebar-hidden');
            if (overlay) {
                overlay.classList.remove('visible');
                overlay.setAttribute('aria-hidden', 'true');
            }
        }

        function openSidebar() {
            const sidebar = document.getElementById('sidebar');
            const container = document.getElementById('app-container');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar) sidebar.classList.remove('collapsed');
            if (container) container.classList.remove('sidebar-hidden');
            if (overlay) {
                overlay.classList.add('visible');
                overlay.setAttribute('aria-hidden', 'false');
            }
        }

        function setupEventListeners() {
            document.getElementById('search-input').addEventListener('input', debounce((e) => handleFilter(e.target.value), 300));
            document.getElementById('prev-btn').addEventListener('click', () => changePage(-1));
            document.getElementById('next-btn').addEventListener('click', () => changePage(1));

            // Sidebar Toggle
            const overlay = document.getElementById('sidebar-overlay');

            document.getElementById('sidebar-close-btn').addEventListener('click', closeSidebar);
            document.getElementById('sidebar-open-btn').addEventListener('click', openSidebar);
            if (overlay) overlay.addEventListener('click', closeSidebar);

            // Article Nav
            document.getElementById('nav-prev-article').addEventListener('click', () => navigateArticle(-1));
            document.getElementById('nav-next-article').addEventListener('click', () => navigateArticle(1));

            // Setup Citation Button
            document.getElementById('citation-btn').addEventListener('click', () => {
                const post = allPosts.find(p => p.id === currentPostId);
                if (post) openCitationModal(post);
            });

            // Keyboard
            document.addEventListener('keydown', (e) => {
                const tag = document.activeElement ? document.activeElement.tagName.toLowerCase() : '';
                const isInput = tag === 'input' || tag === 'textarea' || tag === 'select' || (document.activeElement && document.activeElement.isContentEditable);
                if (isInput) return;
                if (document.getElementById('citation-modal')) return;

                if (e.key === 'ArrowLeft') navigateArticle(-1);
                else if (e.key === 'ArrowRight') navigateArticle(1);
            });
        }

        // Step 2 & 3: Top-N pills with count badges + More dropdown
        function initTags(posts) {
            const tagCounts = new Map();
            posts.forEach(p => {
                if (p.tags) p.tags.forEach(t => {
                    tagCounts.set(t, (tagCounts.get(t) || 0) + 1);
                });
            });

            // Sort by count descending, then alphabetically
            const sortedTags = Array.from(tagCounts.entries())
                .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));

            const topTags = sortedTags.slice(0, TOP_TAGS_COUNT);
            const moreTags = sortedTags.slice(TOP_TAGS_COUNT);

            const container = document.getElementById('filter-tags-container');
            container.innerHTML = '';

            // "All" pill
            const allPill = createTagPill('all', 'All', posts.length);
            allPill.classList.add('active');
            container.appendChild(allPill);

            // Top-N tag pills
            topTags.forEach(([tag, count]) => {
                container.appendChild(createTagPill(tag, tag, count));
            });

            // "More" toggle if remaining tags exist
            const dropdown = document.getElementById('more-tags-dropdown');
            dropdown.innerHTML = '';

            if (moreTags.length > 0) {
                const moreBtn = document.createElement('span');
                moreBtn.className = 'filter-tag more-btn';
                moreBtn.id = 'more-tags-btn';
                moreBtn.innerHTML = `More <span class="tag-count">(${moreTags.length})</span> ▾`;
                moreBtn.onclick = (e) => {
                    e.stopPropagation();
                    moreBtn.classList.toggle('open');
                    dropdown.classList.toggle('open');
                    moreBtn.innerHTML = dropdown.classList.contains('open')
                        ? `Less ▴`
                        : `More <span class="tag-count">(${moreTags.length})</span> ▾`;
                };
                container.appendChild(moreBtn);

                // Render dropdown tags
                moreTags.forEach(([tag, count]) => {
                    dropdown.appendChild(createTagPill(tag, tag, count));
                });
            }
        }

        function createTagPill(dataTag, label, count) {
            const span = document.createElement('span');
            span.className = 'filter-tag';
            span.dataset.tag = dataTag;
            if (dataTag === 'all') {
                span.innerHTML = `${escapeHTML(label)} <span class="tag-count">(${count})</span>`;
            } else {
                span.innerHTML = `${escapeHTML(label)} <span class="tag-count">(${count})</span>`;
            }
            span.onclick = () => selectTag(dataTag);
            // Restore active state if previously selected
            if (activeTags.has(dataTag)) span.classList.add('active');
            return span;
        }

        // Step 4: Multi-select toggle (OR logic)
        function selectTag(tag) {
            if (tag === 'all') {
                activeTags.clear();
            } else {
                if (activeTags.has(tag)) {
                    activeTags.delete(tag);
                } else {
                    activeTags.add(tag);
                }
            }
            refreshTagUI();
            updateURLState();
            document.getElementById('search-input').value = '';
            handleFilter('');
        }

        function refreshTagUI() {
            document.querySelectorAll('.filter-tag').forEach(el => {
                if (el.classList.contains('more-btn')) return;
                if (el.dataset.tag === 'all') {
                    el.classList.toggle('active', activeTags.size === 0);
                } else if (el.dataset.tag) {
                    el.classList.toggle('active', activeTags.has(el.dataset.tag));
                }
            });
            // Update active filters badge
            const badge = document.getElementById('active-filters-badge');
            if (activeTags.size > 0) {
                badge.classList.add('visible');
                badge.innerHTML = `(${activeTags.size} active) <button class="clear-filters-btn" onclick="selectTag('all')" title="Clear all filters">✕</button>`;
            } else {
                badge.classList.remove('visible');
                badge.innerHTML = '';
            }
        }

        function handleFilter(query) {
            const lowerQuery = query.toLowerCase();
            filteredPosts = allPosts.filter(post => {
                // Step 4: Multi-select OR logic — matches if ANY active tag is in the post's tags
                const matchesTag = activeTags.size === 0 || (post.tags && post.tags.some(t => activeTags.has(t)));
                // Enhanced search: title, ID, summary, objective, method, result, and tags
                const matchesSearch = fuzzyMatch(lowerQuery, post.title) ||
                    fuzzyMatch(lowerQuery, post.id) ||
                    fuzzyMatch(lowerQuery, post.summary) ||
                    fuzzyMatch(lowerQuery, post.objective) ||
                    fuzzyMatch(lowerQuery, post.method) ||
                    fuzzyMatch(lowerQuery, post.result) ||
                    (post.tags && post.tags.some(t => t.toLowerCase().includes(lowerQuery)));
                return matchesTag && matchesSearch;
            });
            currentPage = 1;
            renderSidebar();
        }

        function renderSidebar() {
            if (!document.startViewTransition) {
                _renderSidebarContent();
                return;
            }
            document.startViewTransition(() => {
                _renderSidebarContent();
            });
        }

        function _renderSidebarContent() {
            const listContainer = document.getElementById('sidebar-list');
            listContainer.innerHTML = '';

            if (filteredPosts.length === 0) {
                listContainer.innerHTML = '<div style="text-align:center; margin-top:30px; color:#94a3b8; font-size:0.9rem;">No results found.</div>';
                updatePaginationControls();
                return;
            }

            const startIndex = (currentPage - 1) * itemsPerPage;
            const pageItems = filteredPosts.slice(startIndex, startIndex + itemsPerPage);

            pageItems.forEach(post => {
                const item = document.createElement('div');
                item.className = 'article-list-item';
                // Assign a unique view-transition-name to each item if possible, but for lists usually a container transition is fine.
                // We'll rely on the default container cross-fade for now.
                if (post.id === currentPostId) item.classList.add('active');
                item.dataset.id = post.id;
                
                const searchQuery = document.getElementById('search-input').value;
                const highlightedTitle = highlightText(post.title, searchQuery);
                
                item.innerHTML = `<div class="list-title">${highlightedTitle}</div><div class="list-meta"><span>${escapeHTML(post.date)}</span></div>`;
                item.onclick = () => loadArticle(post);
                listContainer.appendChild(item);
            });
            updatePaginationControls();
        }

        function updatePaginationControls() {
            const totalPages = Math.ceil(filteredPosts.length / itemsPerPage);
            document.getElementById('page-info').textContent = `${currentPage} / ${totalPages || 1}`;
            document.getElementById('prev-btn').disabled = currentPage === 1;
            document.getElementById('next-btn').disabled = currentPage >= totalPages || totalPages === 0;
        }

        function changePage(delta) {
            currentPage += delta;
            renderSidebar();
            document.querySelector('.sidebar-content').scrollTop = 0;
        }

        function clearArticle() {
            currentPostId = null;
            document.title = "Medical Research Blog";
            document.getElementById('empty-state').style.display = 'flex';
            document.getElementById('article-view').classList.remove('visible');
            document.querySelectorAll('.article-list-item').forEach(el => el.classList.remove('active'));
            document.getElementById('toc-list').innerHTML = '';
            if (tocObserver) {
                tocObserver.disconnect();
                tocObserver = null;
            }
            if (window.updateReadingProgress) window.updateReadingProgress();
        }

        function loadArticle(post, pushHistory = true) {
            currentPostId = post.id;
            document.title = `${post.title} | Medical Research Blog`;

            document.getElementById('empty-state').style.display = 'none';
            const articleView = document.getElementById('article-view');
            articleView.classList.remove('visible');

            document.getElementById('post-date').textContent = post.date;
            document.getElementById('post-id').textContent = post.id;
            document.getElementById('post-title').textContent = post.title;

            const tagsContainer = document.getElementById('post-tags');
            tagsContainer.innerHTML = '';
            if (post.tags && post.tags.length > 0) {
                post.tags.forEach(tag => {
                    const tagEl = document.createElement('span');
                    tagEl.className = 'tag-badge';
                    tagEl.textContent = tag;
                    tagEl.onclick = (e) => { e.stopPropagation(); selectTag(tag); };
                    tagsContainer.appendChild(tagEl);
                });
            } else {
                tagsContainer.innerHTML = '<span style="color:#cbd5e1; font-size:0.8rem;">No tags</span>';
            }

            // Render Content
            const summaryContainer = document.getElementById('formatted-summary-container');
            summaryContainer.innerHTML = parseContent(post);

            // Generate ToC AFTER content is rendered
            generateToC();

            // Render Related Papers
            renderRelatedPapers(post);

            const linkBtn = document.getElementById('post-link');
            if (post.pmid) {
                linkBtn.href = `https://pubmed.ncbi.nlm.nih.gov/${post.pmid}/`;
                linkBtn.innerHTML = `📖 View on PubMed`;
                linkBtn.style.display = 'inline-flex';
            } else if (post.link) {
                linkBtn.href = post.link;
                linkBtn.innerHTML = `📖 Read Source`;
                linkBtn.style.display = 'inline-flex';
            } else {
                linkBtn.style.display = 'none';
            }

            document.querySelectorAll('.article-list-item').forEach(el => el.classList.remove('active'));
            const activeEl = document.querySelector(`.article-list-item[data-id="${post.id}"]`);
            if (activeEl) activeEl.classList.add('active');

            // Step 5: Preserve tag state in URL when navigating articles
            if (pushHistory) {
                const params = new URLSearchParams();
                params.set('id', post.id);
                if (activeTags.size > 0) params.set('tag', Array.from(activeTags).join(','));
                const newUrl = `${window.location.pathname}?${params.toString()}`;
                history.pushState({ id: post.id }, '', newUrl);
            }
            updateNavButtonsState();

            setTimeout(() => {
                articleView.classList.add('visible');
                if (window.updateReadingProgress) window.updateReadingProgress();
            }, 50);
            document.querySelector('.main-content').scrollTop = 0;
            window.scrollTo(0, 0); // For mobile

            // Auto-collapse sidebar on mobile select
            if (window.innerWidth <= 1024) {
                closeSidebar();
            }
        }

        /* --- 3. DYNAMIC ToC LOGIC --- */
        function generateToC() {
            const tocContainer = document.getElementById('toc-container');
            const tocList = document.getElementById('toc-list');
            tocList.innerHTML = '';

            const headers = document.querySelectorAll('.sec-header');

            if (tocObserver) {
                tocObserver.disconnect();
                tocObserver = null;
            }

            if (headers.length > 0 && window.innerWidth > 1200) {
                const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
                const scrollBehavior = prefersReducedMotion ? 'auto' : 'smooth';
                tocContainer.style.display = 'block';
                headers.forEach((header, index) => {
                    header.id = `section-${index}`; // Assign ID for anchor
                    const link = document.createElement('a');
                    link.className = 'toc-link';
                    link.textContent = header.textContent;
                    link.setAttribute('href', `#section-${index}`);
                    link.onclick = (e) => {
                        e.preventDefault();
                        header.scrollIntoView({ behavior: scrollBehavior, block: 'start' });
                        document.querySelectorAll('.toc-link').forEach(el => el.classList.remove('active'));
                        link.classList.add('active');
                    };
                    tocList.appendChild(link);
                });

                // Setup dynamic intersection observer to track active section while scrolling
                tocObserver = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const targetId = entry.target.id;
                            document.querySelectorAll('.toc-link').forEach(link => {
                                if (link.getAttribute('href') === `#${targetId}`) {
                                    link.classList.add('active');
                                    link.scrollIntoView({ behavior: scrollBehavior, block: 'nearest' });
                                } else {
                                    link.classList.remove('active');
                                }
                            });
                        }
                    });
                }, {
                    root: document.querySelector('.main-content') || null,
                    rootMargin: '-80px 0px -70% 0px',
                    threshold: 0
                });

                headers.forEach(header => tocObserver.observe(header));
            } else {
                tocContainer.style.display = 'none';
            }
        }

        /* --- 2. RELATED PAPERS LOGIC --- */
        function renderRelatedPapers(currentPost) {
            const container = document.getElementById('related-papers');
            const grid = document.getElementById('related-grid');
            grid.innerHTML = '';

            // Find overlapping tags, excluding current post
            const related = allPosts.filter(p =>
                p.id !== currentPost.id &&
                p.tags && currentPost.tags &&
                p.tags.some(t => currentPost.tags.includes(t))
            ).slice(0, 3); // Top 3

            if (related.length > 0) {
                container.style.display = 'block';
                related.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'related-card';
                    card.innerHTML = `<div class="related-title">${escapeHTML(p.title)}</div><div class="related-date">${escapeHTML(p.date)}</div>`;
                    card.onclick = () => loadArticle(p);
                    grid.appendChild(card);
                });
            } else {
                container.style.display = 'none';
            }
        }

        function navigateArticle(direction) {
            if (!currentPostId || filteredPosts.length === 0) return;
            const currentIndex = filteredPosts.findIndex(p => p.id === currentPostId);
            if (currentIndex === -1) return;
            const newIndex = currentIndex + direction;
            if (newIndex >= 0 && newIndex < filteredPosts.length) {
                loadArticle(filteredPosts[newIndex]);
            }
        }

        function updateNavButtonsState() {
            const currentIndex = filteredPosts.findIndex(p => p.id === currentPostId);
            document.getElementById('nav-prev-article').disabled = (currentIndex <= 0);
            document.getElementById('nav-next-article').disabled = (currentIndex >= filteredPosts.length - 1);
        }

        function parseContent(post) {
            if (post.objective || post.method || post.result) {
                let html = '';
                if (post.objective) html += `<div class="research-section"><div class="sec-header">Objective</div><div class="sec-content">${escapeHTML(post.objective).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</div></div>`;
                if (post.method) html += `<div class="research-section"><div class="sec-header">Methods</div><div class="sec-content">${escapeHTML(post.method).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</div></div>`;
                if (post.result) html += `<div class="research-section"><div class="sec-header">Results & Conclusion</div><div class="sec-content">${escapeHTML(post.result).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</div></div>`;
                return html;
            }
            return parseSummaryToSections(post.summary);
        }

        function parseSummaryToSections(text) {
            if (!text) return '<p style="color:var(--text-muted); font-style:italic;">No summary content available.</p>';
            const lines = text.split(/\n/);
            let html = '';
            lines.forEach(line => {
                let cleanLine = line.trim().replace(/^[-•*]\s*/, '');
                if (!cleanLine) return;

                let sectionTitle = "";
                let sectionContent = cleanLine;

                if (cleanLine.match(/^(วัตถุประสงค์|Objective)/i)) sectionTitle = "Objective";
                else if (cleanLine.match(/^(วิธีการ|Method)/i)) sectionTitle = "Methods";
                else if (cleanLine.match(/^(ผลลัพธ์|Result|Conclusion|สรุป|ผลวิเคราะห์)/i)) sectionTitle = "Results & Conclusion";

                if (sectionTitle) {
                    sectionContent = cleanLine.replace(/^(\*\*)?(วัตถุประสงค์|Objective|วิธีการ|Method|Methods|Results|Result|Conclusion|สรุป|ผลลัพธ์|ผลวิเคราะห์).*?[:：]?(\*\*)?[:：]?\s*/i, '').trim();
                    // Sanitize first, then allow bold formatting
                    const safeSectionContent = escapeHTML(sectionContent).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    html += `<div class="research-section"><div class="sec-header">${sectionTitle}</div><div class="sec-content">${safeSectionContent}</div></div>`;
                } else {
                    // Sanitize first, then allow bold formatting
                    const formattedContent = escapeHTML(cleanLine).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    html += `<div class="research-section"><div class="sec-content">${formattedContent}</div></div>`;
                }
            });
            return html;
        }

        // Step 5: URL state sync — restore tags from ?tag= param
        function handleRouting() {
            const params = new URLSearchParams(window.location.search);

            // Restore tag state from URL
            const tagParam = params.get('tag');
            if (tagParam) {
                tagParam.split(',').forEach(t => {
                    const trimmed = t.trim();
                    if (trimmed) activeTags.add(trimmed);
                });
                refreshTagUI();
                handleFilter('');
            }

            // Load specific article if ID present
            const id = params.get('id');
            if (id && allPosts.length > 0) {
                const post = allPosts.find(p => p.id === id);
                if (post) loadArticle(post, false);
            }
        }

        function updateURLState() {
            const params = new URLSearchParams(window.location.search);
            if (activeTags.size > 0) {
                params.set('tag', Array.from(activeTags).join(','));
            } else {
                params.delete('tag');
            }
            const newUrl = `${window.location.pathname}${params.toString() ? '?' + params.toString() : ''}`;
            history.replaceState(history.state, '', newUrl);
        }

        window.onpopstate = function (event) {
            // Restore tags from URL on back/forward
            const params = new URLSearchParams(window.location.search);
            activeTags.clear();
            const tagParam = params.get('tag');
            if (tagParam) {
                tagParam.split(',').forEach(t => {
                    const trimmed = t.trim();
                    if (trimmed) activeTags.add(trimmed);
                });
            }
            refreshTagUI();
            handleFilter(document.getElementById('search-input').value || '');

            if (event.state && event.state.id) {
                const post = allPosts.find(p => p.id === event.state.id);
                if (post) {
                    loadArticle(post, false);
                } else {
                    clearArticle();
                }
            } else {
                clearArticle();
            }
        };

    </script>
