name: Normalize Fray Dashboard Snapshot

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    paths:
      - 'fray/dashboard-snapshot.json'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dashboard-normalization
  cancel-in-progress: false

jobs:
  normalize:
    runs-on: ubuntu-latest
    outputs:
      pushed: ${{ steps.commit.outputs.pushed }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run Normalization Script
        run: node .github/scripts/normalize_dashboard.js

      - name: Commit and Push Changes
        id: commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the newly normalized clean snapshot
          git add fray/dashboard-snapshot-clean.json
          
          # If there is a diff, commit and push, and set pushed=true
          git diff --staged --quiet || (git commit -m "data: normalize Fray dashboard snapshot [skip ci]" && git push && echo "pushed=true" >> "$GITHUB_OUTPUT")

  deploy:
    needs: normalize
    if: ${{ needs.normalize.outputs.pushed == 'true' }}
    uses: ./.github/workflows/pages-build-deployment.yml
    secrets: inherit
    permissions:
      contents: read
      pages: write
      id-token: write
