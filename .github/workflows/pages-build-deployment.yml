name: Build and deploy to GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'latest_updates.json'
      - 'tracking/track_list.json'
      - 'README.md'
      - 'ARCHITECTURE.md'
      - '.github/**'
  workflow_dispatch:
  repository_dispatch:
    types: [update-pl-site]
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # เพิ่มขั้นตอน: ดึงข้อมูลจาก Private Repository มาวางไว้ในโฟลเดอร์ pl/
      - name: Checkout private pl repository
        uses: actions/checkout@v4
        with:
          repository: NTWKKM/pl
          token: ${{ secrets.PAT_FOR_PL }}
          path: pl

      # เพิ่ม Step นี้เข้าไปเพื่อสร้างไฟล์สารบัญ tree.json ไว้ในโฟลเดอร์ pl
      - name: Generate file tree for pl
        run: |
          cd pl
          node -e "
          const fs = require('fs');
          const path = require('path');
          function walk(dir, fileList = [], baseDir = '') {
            const files = fs.readdirSync(dir);
            for (const file of files) {
              if (['.git', '.github', 'node_modules'].includes(file)) continue;
              const filePath = path.join(dir, file);
              const relPath = baseDir ? baseDir + '/' + file : file;
              const stat = fs.statSync(filePath);
              if (stat.isDirectory()) {
                fileList.push({ path: relPath, type: 'tree' });
                walk(filePath, fileList, relPath);
              } else {
                fileList.push({ path: relPath, type: 'blob' });
              }
            }
            return fileList;
          }
          fs.writeFileSync('tree.json', JSON.stringify({ tree: walk('.') }));
          "

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
