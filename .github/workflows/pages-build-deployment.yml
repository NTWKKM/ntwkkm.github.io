name: Build and deploy to GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'latest_updates.json'
      - 'tracking/track_list.json'
      - 'README.md'
      - 'ARCHITECTURE.md'
      - '.github/**'
  workflow_dispatch:
  repository_dispatch:
    types: [update-pl-site]
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ดึงข้อมูลจาก Private Repository มาวางไว้ในโฟลเดอร์ pl/
      # ไฟล์ tree_encrypted.json และ external_links_encrypted.json ถูกสร้างใน pl repo แล้ว
      - name: Checkout private pl repository
        uses: actions/checkout@v4
        with:
          repository: NTWKKM/pl
          token: ${{ secrets.PAT_FOR_PL }}
          path: pl

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
