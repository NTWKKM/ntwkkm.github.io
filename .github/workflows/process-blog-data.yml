name: Process Blog Data

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    paths:
      - 'latest_updates.json' # ทำงานอัตโนมัติเฉพาะเมื่อ n8n อัปเดตไฟล์นี้
  workflow_dispatch: # อนุญาตให้กดรันแบบ Manual บน GitHub ได้

permissions:
  contents: write

# *** ป้องกันการ Push ชนกันของ GitHub Actions ***
concurrency:
  group: blog-data-processing
  cancel-in-progress: false

jobs:
  process-and-chunk:
    runs-on: ubuntu-latest
    outputs:
      pushed: ${{ steps.commit.outputs.pushed }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run Data Processing Script
        id: process
        # อ่าน latest_updates ก่อน merge + write chunks
        run: node .github/scripts/process_blog.js

      - name: Delete latest_updates.json
        # สำคัญ: ลบไฟล์เสมอแม้ Run Data Processing Script จะ fail
        if: always()
        run: rm -f latest_updates.json

      - name: Commit and Push Changes
        id: commit
        # สำคัญ: ต้องทำงานเสมอเพื่อ push การลบไฟล์ (หรือไฟล์ chunk ใหม่) ขึ้น GitHub
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ "${{ steps.process.outcome }}" = "success" ]; then
            # Processing สำเร็จ: Stage ทุกอย่าง (chunks ใหม่ + ลบไฟล์ input)
            git add -A
          else
            # Processing ล้มเหลว: Stage เฉพาะการลบไฟล์ input เพื่อ cleanup
            git add latest_updates.json
          fi
          
          # ถ้ามีไฟล์ถูกแก้ไข ให้ commit และ push (ถ้าไม่มีการเปลี่ยนจะถูก skip ไป)
          git diff --staged --quiet || (git commit -m "chore: auto-chunk blog data into folders and update index" && git push && echo "pushed=true" >> "$GITHUB_OUTPUT")

  deploy:
    needs: process-and-chunk
    if: ${{ needs.process-and-chunk.outputs.pushed == 'true' }}
    uses: ./.github/workflows/pages-build-deployment.yml
    permissions:
      contents: read
      pages: write
      id-token: write

  update-readme:
    needs: process-and-chunk
    if: ${{ needs.process-and-chunk.outputs.pushed == 'true' }}
    uses: ./.github/workflows/update-readme.yml
    permissions:
      contents: write
