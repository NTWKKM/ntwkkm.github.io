<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fray 🦋 System Monitor</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Inter', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 2rem; border-radius: 1rem; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); border: 1px solid #334155; width: 400px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .status-pill { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
        .online { background: #065f46; color: #34d399; }
        .offline { background: #7f1d1d; color: #fca5a5; }
        .metric { display: flex; justify-content: space-between; margin: 0.75rem 0; font-family: monospace; }
        .label { color: #94a3b8; }
        .value { color: #f1f5f9; font-weight: bold; }
        .footer { margin-top: 1.5rem; text-align: center; font-size: 0.7rem; color: #64748b; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h2 style="margin:0">Fray 🦋</h2>
            <span id="status" class="status-pill online">Initializing...</span>
        </div>
        <div id="metrics">
            <div class="metric"><span class="label">CPU Load</span> <span id="cpu" class="value">-</span></div>
            <div class="metric"><span class="label">RAM Usage</span> <span id="ram" class="value">-</span></div>
            <div class="metric"><span class="label">Battery</span> <span id="bat" class="value">-</span></div>
            <div class="metric"><span class="label">Network</span> <span id="net" class="value">-</span></div>
            <div class="metric"><span class="label">Circuit</span> <span id="circuit" class="value">-</span></div>
        </div>
        <div class="footer">Last Sync: <span id="timestamp">-</span></div>
    </div>
    <script>
        async function updateDashboard() {
            try {
                const response = await fetch('dashboard-snapshot.json');
                const data = await response.json();
                document.getElementById('status').innerText = data.system.status;
                document.getElementById('status').className = 'status-pill ' + (data.system.status === 'ONLINE' ? 'online' : 'offline');
                document.getElementById('cpu').innerText = data.metrics.cpu_load + '%';
                document.getElementById('ram').innerText = data.metrics.ram_used_gb + ' GB';
                document.getElementById('bat').innerText = data.metrics.battery_pct + '%';
                document.getElementById('net').innerText = data.metrics.network_status;
                document.getElementById('circuit').innerText = data.system.circuit_breaker;
                document.getElementById('timestamp').innerText = data.system.timestamp;
            } catch (e) { console.error("Fetch failed", e); }
        }
        setInterval(updateDashboard, 30000);
        updateDashboard();
    </script>
</body>
</html>
