<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fray 🦋 Status Center</title>
    <style>
        body { background: #0f17 la; color: #f8fafc; font-family: 'Inter', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 2rem; border-radius: 1.5rem; box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5); border: 1px solid #334155; width: 450px; transition: all 0.3s ease; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .status-pill { padding: 0.3rem 0.8rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; transition: background 0.5s ease; }
        .full { background: #065f46; color: #34d399; }
        .degraded { background: #854d0e; color: #fde047; }
        .critical { background: #7f1d1d; color: #fca5a5; }
        .metric { display: flex; justify-content: space-between; margin: 0.8rem 0; font-family: 'JetBrains Mono', monospace; border-bottom: 1px solid #334155; padding-bottom: 0.4rem; }
        .label { color: #94a3b8; font-size: 0.9rem; }
        .value { color: #f1f5f9; font-weight: 600; }
        .reflection-box { background: #0f172a; padding: 1rem; border-radius: 0.75rem; margin: 1rem 0; font-style: italic; font-size: 0.85rem; color: #cbd5e1; border-left: 4px solid #38bdf8; }
        .footer { margin-top: 1.5rem; text-align: center; font-size: 0.7rem; color: #64748b; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h2 style="margin:0; font-size: 1.5rem;">Fray 🦋 <span style="font-size: 0.8rem; color: #64748b;">v1.1</span></h2>
            <span id="tier" class="status-pill full">FULL</span>
        </div>
        <div class="metric"><span class="label">Current Mindset</span> <span id="mindset" class="value">-</span></div>
        <div class="metric"><span class="label">Circuit Breaker</span> <span id="circuit" class="value">-</span></div>
        <div class="metric"><span class="label">Security Lock</span> <span id="lock" class="value">-</span></div>
        
        <div style="margin: 1.5rem 0 0.5rem 0; color: #64748b; font-size: 0.8rem; font-weight: 600;">CORE METRICS</div>
        <div id="metrics">
            <div class="metric"><span class="label">CPU Load</span> <span id="cpu" class="value">-</span></div>
            <div class="metric"><span class="label">RAM Usage</span> <span id="ram" class="value">-</span></div>
            <div class="metric"><span class="label">Battery</span> <span id="bat" class="value">-</span></div>
            <div class="metric"><span class="label">Network</span> <span id="net" class="value">-</span></div>
        </div>
        
        <div style="margin: 1.5rem 0 0.5rem 0; color: #64748b; font-size: 0.8rem; font-weight: 600;">LATEST REFLECTION</div>
        <div id="reflection" class="reflection-box">Awaiting first reflection...</div>
        
        <div class="footer">Last Sync: <span id="timestamp">-</span></div>
    </div>
    <script>
        async function updateDashboard() {
            try {
                const response = await fetch('dashboard-snapshot.json');
                const data = await response.json();
                const tier = data.system.tier || 'full';
                document.getElementById('tier').innerText = tier.toUpperCase();
                document.getElementById('tier').className = 'status-pill ' + tier;
                document.getElementById('mindset').innerText = data.system.mindset || 'Sati-Observation';
                document.getElementById('circuit').innerText = data.system.circuit_breaker;
                document.getElementById('lock').innerText = data.system.security_lock ? 'LOCKED' : 'UNLOCKED';
                document.getElementById('cpu').innerText = data.metrics.cpu_load + '%';
                document.getElementById('ram').innerText = data.metrics.ram_used_gb + ' GB';
                document.getElementById('bat').innerText = data.metrics.battery_pct + '%';
                document.getElementById('net').innerText = data.metrics.network_status;
                document.getElementById('reflection').innerText = data.system.last_reflection || 'No reflection recorded.';
                document.getElementById('timestamp').innerText = data.system.timestamp;
            } catch (e) { console.error("Fetch failed", e); }
        }
        setInterval(updateDashboard, 30000);
        updateDashboard();
    </script>
</body
</html>
