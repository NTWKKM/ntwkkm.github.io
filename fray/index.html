<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fray | Evidence Planning Board</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --board-color: #2c2c2c;
            --text-color: #e0e0e0;
            --accent-color: #f1c40f;
            --note-bg: #fff9c4;
            --note-text: #333;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
        }

        #board-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: var(--board-color);
            background-image: 
                radial-gradient(circle, #3a3a3a 1px, transparent 1px);
            background-size: 30px 30px;
            overflow: hidden;
        }

        #toolbar {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            z-index: 1000;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid #444;
        }

        button {
            padding: 8px 16px;
            cursor: pointer;
            background: #444;
            color: white;
            border: 1px solid #666;
            border-radius: 4px;
            font-weight: bold;
            transition: all 0.2s;
        }

        button:hover {
            background: #555;
            border-color: var(--accent-color);
        }

        button.clear-btn {
            background: #c0392b;
        }

        button.clear-btn:hover {
            background: #e74c3c;
        }

        .post-it {
            position: absolute;
            width: 200px;
            min-height: 150px;
            background-color: var(--note-bg);
            color: var(--note-text);
            padding: 15px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            cursor: grab;
            user-select: none;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            flex-direction: column;
            transition: transform 0.1s;
        }

        .post-it:active {
            cursor: grabbing;
            transform: scale(1.02) rotate(-1deg);
            z-index: 999 !important;
        }

        .post-it textarea {
            width: 100%;
            height: 120px;
            border: none;
            background: transparent;
            resize: none;
            font-family: inherit;
            font-size: 16px;
            outline: none;
            color: inherit;
        }

        .post-it .delete-note {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 20px;
            height: 20px;
            background: #ff4444;
            color: white;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        .post-it:hover .delete-note {
            display: flex;
        }

        /* Responsive logic for wide screens */
        @media (min-width: 1920px) {
            #board-container {
                background-size: 40px 40px;
            }
        }
    </style>
</head>
<body>

    <div id="toolbar">
        <button onclick="createNote()">+ Add Note</button>
        <button class="clear-btn" onclick="clearBoard()">🗑️ Clear Board</button>
        <span style="align-self: center; font-size: 12px; opacity: 0.6; margin-left: 10px;">Auto-saves to LocalStorage</span>
    </div>

    <div id="board-container"></div>

    <script>
        const board = document.getElementById('board-container');
        let notes = JSON.parse(localStorage.getItem('fray_board_notes')) || [];

        function save() {
            localStorage.setItem('fray_board_notes', JSON.stringify(notes));
        }

        function createNote(x = 100, y = 100, text = '', id = null) {
            const noteId = id || Date.now();
            const noteEl = document.createElement('div');
            noteEl.className = 'post-it';
            noteEl.id = `note-${noteId}`;
            noteEl.style.left = x + 'px';
            noteEl.style.top = y + 'px';
            noteEl.style.zIndex = notes.length + 1;

            const deleteBtn = document.createElement('div');
            deleteBtn.className = 'delete-note';
            deleteBtn.innerText = '×';
            deleteBtn.onclick = () => {
                noteEl.remove();
                notes = notes.filter(n => n.id !== noteId);
                save();
            };

            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.placeholder = 'Type something...';
            textarea.oninput = (e) => {
                const note = notes.find(n => n.id === noteId);
                if (note) note.text = e.target.value;
                save();
            };

            noteEl.appendChild(deleteBtn);
            noteEl.appendChild(textarea);
            board.appendChild(noteEl);

            if (!id) {
                notes.push({ id: noteId, x, y, text });
                save();
            }

            makeDraggable(noteEl, noteId);
        }

        function makeDraggable(el, id) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;

            el.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                if (e.target.tagName === 'TEXTAREA') return;
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
                el.style.zIndex = 1000;
            }

            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                
                const newTop = el.offsetTop - pos2;
                const newLeft = el.offsetLeft - pos1;
                
                el.style.top = newTop + "px";
                el.style.left = newLeft + "px";

                const note = notes.find(n => n.id === id);
                if (note) {
                    note.x = newLeft;
                    note.y = newTop;
                }
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
                save();
                // simple z-index management
                el.style.zIndex = notes.length;
            }
        }

        function clearBoard() {
            if (confirm('Are you sure you want to clear all notes? This cannot be undone.')) {
                notes = [];
                localStorage.removeItem('fray_board_notes');
                board.innerHTML = '';
                renderNotes();
            }
        }

        function renderNotes() {
            board.innerHTML = '';
            notes.forEach(n => createNote(n.x, n.y, n.text, n.id));
        }

        renderNotes();
    </script>
</body>
</html>
