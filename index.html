    <main class="container" role="main">

        <section id="works-section" class="animate-entry heavy-section-deferred" aria-label="Projects">

            All Rights Reserved.
        </div>
        <div style="margin-top: 8px; font-size: 0.85rem; opacity: 0.7;">
            Bridging Clinical Practice with Digital Innovation.
        </div>
    </footer>

    <script src="shared.js"></script>
    <script>
        // Register Service Worker for PWA offline support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((registration) => {
                        console.log('[PWA] ServiceWorker registered:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('[PWA] ServiceWorker registration failed:', error);
                    });
            });
        }

        // Initialize screen reader announcer on page load
        document.addEventListener('DOMContentLoaded', () => {
            initScreenReaderAnnouncer();
        });

        // --- 2. FETCH PROJECTS FROM JSON ---
        async function fetchProjects() {
            const container = document.getElementById('projects-container');
            try {
                // Use an hourly cache-buster instead of Date.now() to optimize bandwidth
                const currentHour = new Date().toISOString().slice(0, 13);
                const response = await fetch(`./projects.json?v=${currentHour}`);
                if (!response.ok) throw new Error('Failed to fetch projects');
                const projects = await response.json();

                container.innerHTML = '';
                projects.forEach((project, index) => {
                    const card = document.createElement('a');
                    card.href = sanitizeURL(project.url);
                    card.target = '_blank';
                    card.className = 'project-card';
                    card.setAttribute('aria-label', escapeHTML(project.title));
                    card.innerHTML = `
                        <div class="project-icon" aria-hidden="true">${escapeHTML(project.icon)}</div>
                        <div class="project-title">${escapeHTML(project.title)}</div>
                        <div class="project-desc">${escapeHTML(project.desc)}</div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error("Error loading projects:", error);
                container.innerHTML = createErrorUI(
                    'Failed to load projects. Please check your connection.',
                    fetchProjects
                );
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchProjects();
            // Dynamic footer year
            const yearEl = document.getElementById('footer-year');
            if (yearEl) yearEl.textContent = new Date().getFullYear();
        });
    </script>
</body>
