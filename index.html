    <script src="shared.js"></script>
    <script>
        // Register Service Worker for PWA offline support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((registration) => {
                        console.log('[PWA] ServiceWorker registered:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('[PWA] ServiceWorker registration failed:', error);
                    });
            });
        }

        // Initialize screen reader announcer on page load
        document.addEventListener('DOMContentLoaded', () => {
            initScreenReaderAnnouncer();
        });

        // Strip residual markdown formatting (e.g. **bold**) from AI-generated text
        function stripMarkdown(str) {
            if (!str) return '';
            return String(str).replace(/\*\*/g, '').trim();
        }

        // --- 2. FETCH PAPERS FROM JSON ---
        async function fetchPapers() {
            const container = document.getElementById('paper-container');

            try {
                // Use an hourly cache-buster instead of Date.now() to optimize bandwidth
                const currentHour = new Date().toISOString().slice(0, 13);

                // Use fetchWithFallback for resilience
                const papers = await fetchWithFallback(
                    `./papers.json?v=${currentHour}`,
                    null,
                    2
                );

                if (!papers || !Array.isArray(papers)) {
                    throw new Error('Invalid data format received');
                }

                container.innerHTML = ''; // Clear skeletons

                papers.forEach((paper, index) => {
                    const card = document.createElement('div');
                    card.className = 'paper-card animate-entry';
                    card.style.animationDelay = `${index * 0.1}s`;

                    card.innerHTML = `
                        <div class="paper-date">${escapeHTML(paper.date)}</div>
                        <div class="paper-title">${escapeHTML(stripMarkdown(paper.title))}</div>
                        <div class="paper-comment">"${escapeHTML(paper.comment)}"</div>
                        <a href="${sanitizeURL(paper.link)}" class="paper-link" target="_blank" draggable="false">
                            Read Paper 
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                        </a>
                    `;
                    card.setAttribute('role', 'listitem');
                    container.appendChild(card);
                });

                // Start Controls & Drag Logic
                initSliderControls();

                // Announce to screen readers
                announceToScreenReader(`Loaded ${papers.length} research papers`);

            } catch (error) {
                console.error("Error loading papers:", error);
                container.innerHTML = createErrorUI(
                    'Failed to load latest papers. Please check your connection and try again.',
                    fetchPapers
                );
            }
        }

        // --- 3. SLIDER CONTROLS, AUTO-SCROLL, & DRAG LOGIC ---
        function initSliderControls() {
            const container = document.getElementById('paper-container');
            const prevBtn = document.getElementById('slide-prev');
            const nextBtn = document.getElementById('slide-next');

            // --- AUTO SCROLL & BUTTONS ---
            const getScrollAmount = () => {
                const card = container.querySelector('.paper-card');
                return card ? (card.offsetWidth + 20) * 2 : 680;
            };

            let autoScrollInterval;
            let isPapersSectionVisible = true;

            function startAutoScroll() {
                // Guard: don't start if section is off-screen or tab is hidden
                if (!isPapersSectionVisible || document.hidden) return;

                // Clear existing to avoid duplicates
                clearInterval(autoScrollInterval);

                autoScrollInterval = setInterval(() => {
                    const scrollAmount = getScrollAmount();
                    const isAtEnd = container.scrollLeft + container.clientWidth >= container.scrollWidth - 10;

                    if (isAtEnd) {
                        container.scrollTo({ left: 0, behavior: 'smooth' });
                    } else {
                        container.scrollBy({ left: scrollAmount, behavior: 'smooth' });
                    }
                }, 5000);
            }

            function resetAutoScroll() {
                clearInterval(autoScrollInterval);
                startAutoScroll();
            }

            nextBtn.addEventListener('click', () => {
                resetAutoScroll();
                container.scrollBy({ left: getScrollAmount(), behavior: 'smooth' });
            });

            prevBtn.addEventListener('click', () => {
                resetAutoScroll();
                container.scrollBy({ left: -getScrollAmount(), behavior: 'smooth' });
            });

            // Start Auto Scroll initially (with IntersectionObserver to pause when off-screen)
            const sectionEl = document.getElementById('papers-section');
            if (sectionEl && 'IntersectionObserver' in window) {
                const visibilityObserver = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        isPapersSectionVisible = entry.isIntersecting;
                        if (entry.isIntersecting) {
                            startAutoScroll();
                        } else {
                            clearInterval(autoScrollInterval);
                        }
                    });
                }, { threshold: 0.1 });
                visibilityObserver.observe(sectionEl);
            } else {
                startAutoScroll();
            }

            // --- MOUSE DRAG LOGIC (CLICK & DRAG WITH INERTIA) ---
            let isDown = false;
            let startX;
            let scrollLeft;
            let dragged = false;
            let velocity = 0;
            let lastX;
            let lastTime;
            let rafId = null;

            function trackVelocity(e) {
                const x = e.pageX - container.offsetLeft;
                const now = performance.now();
                if (lastTime !== undefined) {
                    const dt = now - lastTime;
                    const dx = x - lastX;
                    if (dt > 0) {
                        velocity = dx / dt; // pixels per millisecond
                    }
                }
                lastX = x;
                lastTime = now;
            }

            function applyInertia() {
                if (Math.abs(velocity) < 0.1) {
                    if (!isDown) {
                        // Restore snap scroll after scroll comes to a near stop
                        container.style.scrollSnapType = 'x mandatory';
                    }
                    return;
                }
                container.scrollLeft -= velocity * 16; // Approx 16ms frame step
                velocity *= 0.95; // Friction decay
                rafId = requestAnimationFrame(applyInertia);
            }

            container.addEventListener('mousedown', (e) => {
                isDown = true;
                dragged = false;
                if (rafId) cancelAnimationFrame(rafId);
                container.style.scrollSnapType = 'none'; // Temporarily disable snap
                container.classList.add('active');
                startX = e.pageX - container.offsetLeft;
                scrollLeft = container.scrollLeft;
                lastX = e.pageX - container.offsetLeft;
                lastTime = performance.now();
                velocity = 0;

                // Stop auto scroll while user is interacting
                clearInterval(autoScrollInterval);
            });

            container.addEventListener('mouseleave', () => {
                if (isDown) {
                    isDown = false;
                    container.classList.remove('active');
                    startAutoScroll();
                    if (dragged) {
                        rafId = requestAnimationFrame(applyInertia);
                    } else {
                        container.style.scrollSnapType = 'x mandatory';
                    }
                }
            });

            container.addEventListener('mouseup', () => {
                if (isDown) {
                    isDown = false;
                    container.classList.remove('active');
                    startAutoScroll();
                    if (dragged) {
                        rafId = requestAnimationFrame(applyInertia);
                    } else {
                        container.style.scrollSnapType = 'x mandatory';
                    }
                }
            });

            container.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - container.offsetLeft;
                const walk = (x - startX) * 1.5; // Scroll multiplier
                if (Math.abs(x - startX) > 5) {
                    dragged = true;
                }
                container.scrollLeft = scrollLeft - walk;
                trackVelocity(e);
            });

            // Prevent clicks on links inside the container if we actually dragged
            container.addEventListener('click', (e) => {
                if (dragged) {
                    e.preventDefault();
                    e.stopPropagation();
                    dragged = false; // Reset
                }
            }, true); // Intercept in capturing phase

            // Touch support is handled natively by CSS (overflow-x: auto), 
            // but we stop auto-scroll on touch too.
            container.addEventListener('touchstart', () => {
                if (rafId) cancelAnimationFrame(rafId);
                clearInterval(autoScrollInterval);
            });
            container.addEventListener('touchend', () => startAutoScroll());
            container.addEventListener('touchcancel', () => startAutoScroll());

            // Pause auto-scroll when tab is hidden (saves CPU/battery)
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    clearInterval(autoScrollInterval);
                } else {
                    startAutoScroll();
                }
            });
        }

        // --- 4. FETCH PROJECTS FROM JSON ---
        async function fetchProjects() {
            const container = document.getElementById('projects-container');
            try {
                // Use an hourly cache-buster instead of Date.now() to optimize bandwidth
                const currentHour = new Date().toISOString().slice(0, 13);
                const response = await fetch(`./projects.json?v=${currentHour}`);
                if (!response.ok) throw new Error('Failed to fetch projects');
                const projects = await response.json();

                container.innerHTML = '';
                projects.forEach((project, index) => {
                    const card = document.createElement('a');
                    card.href = sanitizeURL(project.url);
                    card.target = '_blank';
                    card.className = 'project-card';
                    card.setAttribute('aria-label', escapeHTML(project.title));
                    card.innerHTML = `
                        <div class="project-icon" aria-hidden="true">${escapeHTML(project.icon)}</div>
                        <div class="project-title">${escapeHTML(project.title)}</div>
                        <div class="project-desc">${escapeHTML(project.desc)}</div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error("Error loading projects:", error);
                container.innerHTML = createErrorUI(
                    'Failed to load projects. Please check your connection.',
                    fetchProjects
                );
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchPapers();
            fetchProjects();
            // Dynamic footer year
            const yearEl = document.getElementById('footer-year');
            if (yearEl) yearEl.textContent = new Date().getFullYear();
        });
    </script>
